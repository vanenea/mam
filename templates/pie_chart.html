{% extends "base.html" %}
{% block content %}

<h2 class="text-center mb-4">资金占比分析</h2>

<div class="row">
    <!-- 用户资金占比 -->
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5 class="card-title mb-0">按用户资金占比</h5>
            </div>
            <div class="card-body">
                <div id="userPieChart" style="height:400px;"></div>
            </div>
        </div>
    </div>

    <!-- 账户资金占比 -->
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5 class="card-title mb-0">按账户资金占比</h5>
            </div>
            <div class="card-body">
                <div id="accountPieChart" style="height:400px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
fetch("/pie-data")
    .then(res => res.json())
    .then(data => {
        // 用户资金占比饼图
        let userChartDom = document.getElementById('userPieChart');
        let userChart = echarts.init(userChartDom);

        let userOption = {
            tooltip: {
                trigger: 'item',
                formatter: '{a} <br/>{b}: {c} ({d}%)'
            },
            legend: {
                orient: 'vertical',
                left: 'left'
            },
            series: [
                {
                    name: '资金占比',
                    type: 'pie',
                    radius: '50%',
                    data: data.users,
                    emphasis: {
                        itemStyle: {
                            shadowBlur: 10,
                            shadowOffsetX: 0,
                            shadowColor: 'rgba(0, 0, 0, 0.5)'
                        }
                    }
                }
            ]
        };
        userChart.setOption(userOption);

        // 账户资金占比饼图
        let accountChartDom = document.getElementById('accountPieChart');
        let accountChart = echarts.init(accountChartDom);

        let accountOption = {
            tooltip: {
                trigger: 'item',
                formatter: '{a} <br/>{b}: {c} ({d}%)'
            },
            legend: {
                orient: 'vertical',
                left: 'left'
            },
            series: [
                {
                    name: '资金占比',
                    type: 'pie',
                    radius: '50%',
                    data: data.accounts,
                    emphasis: {
                        itemStyle: {
                            shadowBlur: 10,
                            shadowOffsetX: 0,
                            shadowColor: 'rgba(0, 0, 0, 0.5)'
                        }
                    }
                }
            ]
        };
        accountChart.setOption(accountOption);
    });
</script>

{% endblock %}
